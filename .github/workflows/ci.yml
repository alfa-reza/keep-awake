name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes bats shellcheck shfmt

      - name: Check Bash syntax
        run: |
          bash -n keep-awake.sh
          bash -n tests/fixtures/bin/fake-inhibit

      - name: Run ShellCheck
        run: |
          shellcheck keep-awake.sh
          shellcheck tests/fixtures/bin/fake-inhibit

      - name: Check formatting
        run: |
          shfmt -d -i 4 -ci keep-awake.sh
          shfmt -d -i 4 -ci tests/fixtures/bin/fake-inhibit

      - name: Run behavioral tests
        run: bats tests/
